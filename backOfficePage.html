<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link
            rel="stylesheet"
            href="https://cdn.jsdelivr.net/npm/bootstrap@4.1.3/dist/css/bootstrap.min.css"
            integrity="sha384-MCw98/SFnGE8fJT3GXwEOngsV7Zt27NXFoaoApmYm81iuXoPkFOJwJ8ERdknLPMO"
            crossorigin="anonymous"
        />
        <title>Back Office</title>
    </head>
    <body>
        <a href="./index.html" class="btn btn-primary m-3">HOME</a>
        <form
            class="form-inline m-2 m-lg-0 p-5 d-flex justify-content-center"
            id="create-form"
        >
            <input
                class="form-control mr-sm-2"
                type="text"
                placeholder="Name"
                name="name"
            />
            <input
                class="form-control mr-sm-2"
                type="text"
                placeholder="Description"
                name="description"
            />
            <input
                class="form-control mr-sm-2"
                type="text"
                placeholder="Brand"
                name="brand"
            />
            <input
                class="form-control mr-sm-2"
                type="text"
                placeholder="ImageUrl"
                name="image"
            />
            <input
                class="form-control mr-sm-2"
                type="text"
                placeholder="Price"
                name="price"
            />
            <button class="btn btn-outline-success my-2 my-sm-0" type="submit">
                Aggiungi Prodotto
            </button>
        </form>
        <div
            class="modal fade"
            id="exampleModal"
            tabindex="-1"
            aria-labelledby="exampleModalLabel"
            aria-hidden="true"
        >
            <div class="modal-dialog">
                <div class="modal-content">
                    <div class="modal-header">
                        <h5 class="modal-title" id="exampleModalLabel">
                            Modifica Prodotto
                        </h5>
                        <button
                            type="button"
                            class="btn btn-close"
                            data-bs-dismiss="modal"
                            aria-label="Close"
                        >
                            X
                        </button>
                    </div>
                    <div class="modal-body">
                        <form
                            class="m-2 d-flex flex-column p-5"
                            id="edit-form"
                            style="gap: 1rem"
                        >
                            <input
                                class="d-none"
                                type="text"
                                name="id"
                                id="_id"
                            />

                            <input
                                class="form-control mr-sm-2"
                                type="text"
                                placeholder="Name"
                                name="name"
                                id="name"
                            />
                            <input
                                class="form-control mr-sm-2"
                                type="text"
                                placeholder="Description"
                                name="description"
                                id="description"
                            />
                            <input
                                class="form-control mr-sm-2"
                                type="text"
                                placeholder="Brand"
                                name="brand"
                                id="brand"
                            />
                            <input
                                class="form-control mr-sm-2"
                                type="text"
                                placeholder="ImageUrl"
                                name="image"
                                id="image"
                            />
                            <input
                                class="form-control mr-sm-2"
                                type="text"
                                placeholder="Price"
                                name="price"
                                id="price"
                            />
                            <button
                                class="btn btn-outline-success my-2 my-sm-0"
                                type="submit"
                            >
                                Modifica
                            </button>
                        </form>
                    </div>
                </div>
            </div>
        </div>

        <script src="./scriptBackOffice.js"></script>
        <script
            src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.min.js"
            integrity="sha384-0pUGZvbkm6XF6gxjEnlmuGrJXVbNuzT9qBBavbLwCsOGabYfZo0T0to5eqruptLy"
            crossorigin="anonymous"
        ></script>
    </body>
</html>
